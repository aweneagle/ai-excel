name: Build Mac App

on:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: |
          pyinstaller --clean --noconfirm excel_assistant.spec

      - name: Ad-hoc code sign
        run: |
          find dist/ExcelAssistant.app -type f \( -name '*.dylib' -o -name '*.so' -o -name '*.o' \) -exec codesign --force --sign - {} \;
          codesign --force --deep --sign - dist/ExcelAssistant.app

      - name: Create zip with ditto
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent ExcelAssistant.app ExcelAssistant.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcelAssistantMacApp
          path: dist/ExcelAssistant.app.zip
